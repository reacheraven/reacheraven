# Default values for the Reacheraven Helm chart.
# This file is YAML-formatted and defines variables to be passed into your templates.
# The values file follows Helm best practices, where variable names use camelCase and each
# property is documented with a one-sentence description.

#######################################
# Global Settings
#######################################
# [replicaCount] defines the number of replicas for each deployment.
replicaCount: 1

# [imagePullPolicy] defines the Docker image pull policy for all deployments.
imagePullPolicy: IfNotPresent

#######################################
# Web Service Configuration
#######################################
web:
  # [web.image] defines the Docker image repository for the Web service.
  image: "reacheraven/reacheraven-web"
  # [web.tag] defines the Docker image tag/version for the Web service.
  tag: "v1.0.14"
  # [web.port] defines the container port on which the Web service runs.
  port: 3000
  service:
    # [web.service.type] specifies the type of Kubernetes service (e.g., ClusterIP).
    type: ClusterIP
    # [web.service.port] defines the port that the Web service will be exposed on.
    port: 3000

#######################################
# API Service Configuration
#######################################
api:
  # [api.image] defines the Docker image repository for the API service.
  image: "reacheraven/reacheraven-api"
  # [api.tag] defines the Docker image tag/version for the API service.
  tag: "v1.0.8"
  # [api.port] defines the container port for the API service.
  port: 8080
  env:
    # [api.env.PORT] defines the port number used by the API application.
    PORT: "8080"
    # [api.env.POSTGRES_URL] defines the PostgreSQL connection URL.
    POSTGRES_URL: "postgres://postgres:changeme@postgres:5432/reacheraven?sslmode=disable"
    # [api.env.REDIS_URL] defines the Redis connection URL.
    REDIS_URL: "redis://redis:6379"
    # [api.env.JWT_SECRET] is a sensitive JWT secret key (should be stored in a Secret).
    JWT_SECRET: "my_secret_key"
    # [api.env.JWT_EXPIRATION_HOURS] defines the expiration time (in hours) for JWT tokens.
    JWT_EXPIRATION_HOURS: "24"
  service:
    # [api.service.type] defines the type of Kubernetes service for the API.
    type: ClusterIP
    # [api.service.port] specifies the external port for the API service.
    port: 8080

#######################################
# Scheduler Service Configuration
#######################################
scheduler:
  # [scheduler.image] defines the Docker image repository for the Scheduler service.
  image: "reacheraven/reacheraven-scheduler"
  # [scheduler.tag] defines the Docker image tag/version for the Scheduler.
  tag: "v1.0.1"
  # [scheduler.port] defines the container port for the Scheduler.
  port: 8081
  env:
    # [scheduler.env.TZ] sets the timezone for the Scheduler.
    TZ: "America/Sao_Paulo"
    # [scheduler.env.PORT] defines the port number used by the Scheduler application.
    PORT: "8081"
    # [scheduler.env.POSTGRES_URL] defines the PostgreSQL connection URL for the Scheduler.
    POSTGRES_URL: "postgres://postgres:changeme@postgres:5432/reacheraven?sslmode=disable"
    # [scheduler.env.REDIS_URL] defines the Redis connection URL for the Scheduler.
    REDIS_URL: "redis://redis:6379"
    # [scheduler.env.RABBITMQ_URL] defines the RabbitMQ connection URL (sensitive; to be stored in a Secret).
    RABBITMQ_URL: "amqp://user:bitnami@rabbitmq:5672"
  service:
    # [scheduler.service.type] specifies the type of Kubernetes service for the Scheduler.
    type: ClusterIP
    # [scheduler.service.port] defines the external port for the Scheduler service.
    port: 8081

#######################################
# Notifier Service Configuration
#######################################
notifier:
  # [notifier.image] defines the Docker image repository for the Notifier service.
  image: "reacheraven/reacheraven-notifier"
  # [notifier.tag] defines the Docker image tag/version for the Notifier.
  tag: "v1.0.1"
  env:
    # [notifier.env.POSTGRES_URL] defines the PostgreSQL connection URL for the Notifier (sensitive).
    POSTGRES_URL: "postgres://postgres:changeme@postgres:5432/reacheraven?sslmode=disable"
    # [notifier.env.RABBITMQ_URL] defines the RabbitMQ connection URL for the Notifier (sensitive).
    RABBITMQ_URL: "amqp://user:bitnami@rabbitmq:5672"
  service:
    # [notifier.service.type] defines the type of Kubernetes service for the Notifier.
    type: ClusterIP
    # [notifier.service.port] specifies the external port for the Notifier service.
    port: 80

#######################################
# Dependency Configuration
#######################################

# PostgreSQL Configuration (via Bitnami chart)
postgresql:
  # [postgresql.enabled] if true, deploy PostgreSQL as a dependency.
  enabled: true
  global:
    postgresql:
      auth:
        # [postgresql.global.postgresql.auth.username] specifies the PostgreSQL username.
        username: "postgres"
        # [postgresql.global.postgresql.auth.password] specifies the PostgreSQL password.
        password: "changeme"
        # [postgresql.global.postgresql.auth.database] specifies the name of the PostgreSQL database.
        database: "reacheraven"
  persistence:
    # [postgresql.persistence.enabled] enables persistent storage for PostgreSQL.
    enabled: true
    # [postgresql.persistence.storageClass] specifies the storage class (empty uses the default).
    storageClass: ""
    # [postgresql.persistence.accessModes] defines the access mode for the volume.
    accessModes:
      - ReadWriteOnce
    # [postgresql.persistence.size] defines the size of the persistent volume.
    size: 8Gi

# Redis Configuration (via Bitnami chart)
redis:
  # [redis.enabled] if true, deploy Redis as a dependency.
  enabled: true
  auth:
    # [redis.auth.enabled] if true, enables Redis authentication.
    enabled: false
  persistence:
    # [redis.persistence.enabled] enables persistent storage for Redis.
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    # [redis.persistence.size] defines the size of the persistent volume for Redis.
    size: 2Gi

# RabbitMQ Configuration (via Bitnami chart)
rabbitmq:
  # [rabbitmq.enabled] if true, deploy RabbitMQ as a dependency.
  enabled: true
  auth:
    # [rabbitmq.auth.username] defines the RabbitMQ username.
    username: "user"
    # [rabbitmq.auth.password] defines the RabbitMQ password.
    password: "bitnami"
  persistence:
    # [rabbitmq.persistence.enabled] enables persistent storage for RabbitMQ.
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    # [rabbitmq.persistence.size] defines the size of the persistent volume for RabbitMQ.
    size: 2Gi

#######################################
# Ingress Configuration (Optional)
#######################################
ingress:
  # [ingress.enabled] if true, an Ingress resource will be created.
  enabled: false
  # [ingress.annotations] provides additional annotations for the Ingress resource.
  annotations: {}
  hosts:
    - host: reacheraven.local  # [ingress.hosts[0].host] the domain name for the Ingress rule.
      paths:
        - path: /            # [ingress.hosts[0].paths[0].path] the URL path for routing traffic.
          pathType: ImplementationSpecific  # [ingress.hosts[0].paths[0].pathType] specifies the type of path matching.
  # [ingress.tls] specifies TLS configuration for the Ingress.
  tls: []